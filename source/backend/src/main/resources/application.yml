spring:
  application:
    name: itsm-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/itsm}
    username: ${DB_USERNAME:itsm}
    password: ${DB_PASSWORD:itsm}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  jackson:
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  access-token-validity-seconds: 300      # 5 minutes
  refresh-token-validity-seconds: 604800  # 7 days

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
